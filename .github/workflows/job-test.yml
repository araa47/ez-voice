---
name: test

on:
    workflow_call:

jobs:
    test:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: latest
                  enable-cache: true
                  cache-dependency-glob: uv.lock

            - name: Set up Python
              run: uv python install

            - name: Install the project
              run: uv sync --all-extras --dev

            - name: Run Tests with Coverage
              run: uv run pytest -m "not e2e" --cov=skills/ez-stt/scripts --cov=skills/ez-tts/scripts --cov-report=term --cov-report=json:coverage.json
                  --cov-report=html:htmlcov

            - name: Upload coverage artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: |
                      coverage.json
                      htmlcov/
                  retention-days: 30
